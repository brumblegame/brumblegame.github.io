<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; padding:0; }
  .card {
    width:1024px; height:1024px; overflow:hidden; position:relative;
    background: radial-gradient(circle at 50% 38%, #ffd84d 0%, #ffc93c 55%, #f0a500 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .bee { width:560px; margin-top:-40px; }
  .word {
    font-family:'Baloo 2','Arial Rounded MT Bold',sans-serif; font-weight:800;
    font-size:128px; letter-spacing:6px; color:#221a10; line-height:1; margin-top:-10px;
  }
</style>
</head>
<body>
<div class="card">
  <svg class="bee" viewBox="-110 -90 200 150">
    <defs>
      <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffe066"/>
        <stop offset="1" stop-color="#ffb300"/>
      </linearGradient>
      <clipPath id="bodyclip"><ellipse cx="0" cy="0" rx="46" ry="32"/></clipPath>
    </defs>
    <g transform="rotate(-12)">
      <ellipse cx="-12" cy="-36" rx="27" ry="15" fill="#dceeff" stroke="#221a10" stroke-width="5" transform="rotate(-28 -12 -36)"/>
      <ellipse cx="16" cy="-34" rx="23" ry="13" fill="#eef7ff" stroke="#221a10" stroke-width="5" transform="rotate(-14 16 -34)"/>
      <ellipse cx="0" cy="0" rx="46" ry="32" fill="url(#honey)" stroke="#221a10" stroke-width="7"/>
      <g clip-path="url(#bodyclip)">
        <rect x="-16" y="-34" width="17" height="68" fill="#221a10"/>
        <rect x="12" y="-34" width="15" height="68" fill="#221a10"/>
      </g>
      <path d="M 44 -6 L 66 2 L 44 10 Z" fill="#221a10"/>
      <circle cx="-44" cy="-2" r="19" fill="#221a10"/>
      <circle cx="-50" cy="-7" r="4" fill="#ffffff"/>
      <path d="M -52 -18 Q -62 -34 -74 -36" fill="none" stroke="#221a10" stroke-width="5" stroke-linecap="round"/>
      <path d="M -42 -20 Q -44 -40 -54 -48" fill="none" stroke="#221a10" stroke-width="5" stroke-linecap="round"/>
      <circle cx="-74" cy="-37" r="5" fill="#221a10"/>
      <circle cx="-55" cy="-49" r="5" fill="#221a10"/>
    </g>
  </svg>
  <div class="word">BRUMBLE</div>
</div>
</body>
</html>
