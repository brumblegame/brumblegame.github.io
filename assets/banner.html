<!DOCTYPE html>
<html>
<head>

<style>

    display:flex; align-items:center; justify-content:center;

    <path d="M 20 20 l 16 -9 16 9 0 19 -16 9 -16 -9 Z"/>
    <path d="M 54 39 l 16 -9 16 9 0 19 -16 9 -16 -9 Z"/>
    <path d="M 20 58 l 16 -9 16 9 0 19 -16 9 -16 -9 Z"/>

</html>
